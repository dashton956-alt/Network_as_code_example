device:
  hostname: srl-test-01
  mgmt_interface:
    name: eth0
    ip: 192.0.2.20
    mask: 24
  dns:
    servers:
      - 8.8.8.8
  ntp:
    servers:
      - 192.0.2.1
  interfaces:
    - name: if-1/1
      description: "Uplink"
      enabled: true
      family: inet
      address: 203.0.113.1/30
    - name: if-1/2
      description: "Access"
      enabled: true
      family: bridge
  vlans:
    - id: 10
      name: users
  bgp:
    asn: 65010
    neighbors:
      - ip: 198.51.100.2
        remote_as: 65011
        description: "peer"
  firewall:
    filters:
      - name: FILTER-1
        terms:
          - name: allow-icmp
            action: accept
            match:
              protocol: icmp
  ipsec:
    - name: srl-ipsec-1
      peer_ip: 198.51.100.2
      psk: SHAREDSECRET
      local_ip: 192.0.2.20
      ike_proposal: aes256-sha256
      ipsec_proposal: aes256-sha256
  evpn:
    vlans:
      - vlan: 10
        name: users
