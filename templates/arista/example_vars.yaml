device:
  hostname: eos-test-01
  domain: example.local
  mgmt_interface:
    name: Management1
    ip: 192.0.2.10
    mask: 255.255.255.0
  ntp:
    servers:
      - 192.0.2.1
  snmp:
    community: public
    v3_users:
      - name: admin
        auth: SHA
        priv: AES
  interfaces:
    - name: Ethernet1
      description: "Uplink to Core"
      admin_up: true
      type: routed
      ip:
        address: 10.0.0.1
        mask: 255.255.255.0
    - name: Ethernet2
      description: "Access port"
      admin_up: true
      type: access
      switchport_vlan: 100
  vlans:
    - id: 100
      name: users
      svi_ip: 10.0.100.1/24
  bgp:
    asn: 65001
    neighbors:
      - ip: 198.51.100.2
        remote_as: 65002
        description: "Peer to provider"
  acls:
    - name: ACL-IN
      entries:
        - action: permit
          protocol: ip
          src: any
          dst: any
  ipsec:
    - name: ipsec-to-peer
      peer_ip: 198.51.100.2
      psk_local: LOCALPSK
      psk_remote: REMOTEPSK
      local_interface: Management1
      transform: TS-AES256
  evpn:
    vlans:
      - vlan: 100
        name: users
        svi: 10.0.100.1/24
        vrf: default
