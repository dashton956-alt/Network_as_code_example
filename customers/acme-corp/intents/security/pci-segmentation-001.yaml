# customers/acme-corp/intents/security/pci-segmentation-001.yaml
#
# Intent: PCI CDE Segmentation Policy
# Owner:  security@acme-corp.com
# PR:     #198  Approved-by: t.jones
# Ticket: CHG0010001

intent:
  id: pci-segmentation-001
  type: security
  version: 1
  status: deployed
  tenant: acme-corp
  description: >
    Enforces network segmentation of the Cardholder Data Environment (CDE)
    from all other network segments per PCI-DSS Requirement 1.3.

  scope:
    vrf: ACME-PCI
    applies_to_groups:
      - finance-servers

  rules:
    # Default deny between CDE and all other internal segments
    - id: rule-001
      action: deny
      direction: both
      source: finance-servers
      destination: employee-lan
      reason: "PCI-DSS Req 1.3: CDE isolation from internal networks"

    - id: rule-002
      action: deny
      direction: both
      source: finance-servers
      destination: dev-servers
      reason: "Dev/test systems must not access CDE"

    - id: rule-003
      action: deny
      direction: both
      source: finance-servers
      destination: staging-servers
      reason: "Staging must not access CDE"

    - id: rule-004
      action: deny
      direction: both
      source: finance-servers
      destination: guest-wifi
      reason: "Guest network isolation from CDE"

    # Explicit permits for required CDE flows
    - id: rule-010
      action: permit
      direction: outbound
      source: finance-servers
      destination: payment-gateway
      protocol: tcp
      port: 443
      reason: "Required: HTTPS to payment gateway only"

    - id: rule-011
      action: permit
      direction: inbound
      source: management-hosts
      destination: finance-servers
      protocol: tcp
      port: 22
      reason: "Secure management access from jump hosts only"

  policy:
    compliance: PCI-DSS
    default_action: deny
    logging: required
    log_destination: siem.acme-corp.com
