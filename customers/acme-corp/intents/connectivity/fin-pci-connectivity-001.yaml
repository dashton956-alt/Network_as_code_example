# customers/acme-corp/intents/connectivity/fin-pci-connectivity-001.yaml
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  Intent: Finance Workload → Payment Gateway (PCI-DSS)                   │
# │  Owner:  netops@acme-corp.com                                           │
# │  PR:     #247  Approved-by: t.jones (senior-engineer)                  │
# │  Date:   2024-03-15   Review-date: 2025-03-15                           │
# │  Ticket: CHG0012345                                                     │
# └─────────────────────────────────────────────────────────────────────────┘
#
# WHAT THIS DOES:
#   Provides a PCI-DSS compliant, encrypted, low-latency path from Acme's
#   finance server group to the Stripe payment gateway. Finance servers are
#   isolated in a dedicated VRF (ACME-PCI) and must never share a routing
#   table with employee or guest traffic.
#
# WHY IT EXISTS:
#   Acme processes card payments. PCI-DSS requires the cardholder data
#   environment (CDE) to be network-segmented from all other systems.
#
# CHANGE HISTORY:
#   v1 - 2024-01-10 - Initial deployment (PR #198)
#   v2 - 2024-03-15 - Added dc-west as source site for DR (PR #247)

intent:
  id: fin-pci-connectivity-001
  type: connectivity
  version: 2
  status: deployed
  tenant: acme-corp
  description: >
    Finance server group connectivity to Stripe payment gateway over
    dedicated PCI-DSS compliant VRF. Dual-site (dc-east + dc-west) for DR.

  source:
    group: finance-servers
    sites:
      - dc-east
      - dc-west

  destination:
    group: payment-gateway
    external: true
    provider: stripe
    # Stripe published IP ranges (verify at https://stripe.com/docs/ips)
    prefixes:
      - 3.18.0.0/14
      - 54.187.174.169/32
      - 54.241.31.99/32

  policy:
    compliance: PCI-DSS
    encryption: required
    max_latency_ms: 20
    failover_ms: 50
    bandwidth_mbps: 500
    qos_class: critical-business

  isolation:
    deny_groups:
      - employee-lan
      - guest-wifi
      - dev-servers
      - staging-servers
    deny_protocols:
      - telnet
      - http
      - ftp
      - snmpv1
      - snmpv2

  implementation_notes: >
    Resolved to VRF ACME-PCI on core routers (acme-ce-rtr-01, acme-ce-rtr-02
    at dc-east; acme-ce-rtr-03, acme-ce-rtr-04 at dc-west).
    BGP community 65000:100 applied for traffic engineering toward PE.
    ACL ACL-ACME-PCI-INGRESS applied on all VRF-facing interfaces.
    Failover tested 2024-03-20 - 42ms measured convergence.
