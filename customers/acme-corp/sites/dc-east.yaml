        - distribution

  # WAN uplinks from this site
  uplinks:
    - provider: BT-Wholesale
      circuit_id: "BT-MPLS-LD5-001"
      bandwidth_mbps: 1000
      type: mpls
      interface: GigabitEthernet0/0/0
      device: acme-ce-rtr-01

    - provider: BT-Wholesale
      circuit_id: "BT-MPLS-LD5-002"
