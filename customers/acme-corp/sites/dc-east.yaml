        - core
        - mpls-pe

    - name: acme-ce-rtr-02
      role: core-router
      platform: cisco-ios-xe
      model: "Cisco ASR 1002-X"
      management_ip: "10.255.1.2/32"
      nautobot_id: "dev-uuid-0002"
      tags:
        - core
        - mpls-pe

    - name: acme-dist-sw-01
      role: distribution-switch
      platform: cisco-ios-xe
      model: "Cisco Catalyst 9500"
      management_ip: "10.255.1.10/32"
      nautobot_id: "dev-uuid-0010"
      tags:
        - distribution

    - name: acme-dist-sw-02
      role: distribution-switch
