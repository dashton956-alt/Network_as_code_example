    - provider: Zayo
      circuit_id: "ZAYO-INET-LD5-001"
      bandwidth_mbps: 2000
      type: internet
      interface: GigabitEthernet0/0/1
      device: acme-ce-rtr-01

  # IP addressing ranges allocated to this site
  addressing:
    management: "10.255.1.0/24"
    loopbacks: "10.254.1.0/24"
    customer_vlans_supernet: "10.100.0.0/16"

  # Committed bandwidth already in use (maintained by reconciliation job)
