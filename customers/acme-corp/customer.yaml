# customers/acme-corp/customer.yaml
# Customer record for Acme Corporation
# This file is the master reference for all customer metadata
# Changes here must go through a PR - they affect OPA policy evaluation

customer:
  id: acme-corp
  name: Acme Corporation
  short_code: ACME
  nautobot_tenant_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

  # Account management
  account_manager: jane.smith@yourcompany.com
  technical_lead: tom.jones@yourcompany.com
  customer_contact: netops@acme-corp.com

  # Contract
  contract_tier: enterprise          # starter | standard | enterprise
  contract_start: "2023-01-01"
  contract_expiry: "2026-12-31"
  contract_reference: "MSA-2023-0042"

  # Features included in contract
  allowed_features:
    - mpls
    - bgp
    - multicast
    - sdwan
    - ipv6
    - qos

  # Compliance profiles authorized for this customer
  compliance_profiles:
    - PCI-DSS
    - SOC2

  # Capacity limits (enforced by OPA capacity.rego)
  capacity_limits:
    max_bandwidth_mbps: 10000
    max_vrfs: 20
    max_prefixes_per_vrf: 500
    max_bgp_neighbors: 50

  # Change management rules
  change_management:
    approval_required: true
    ticket_system: servicenow
    ticket_prefix: CHG
    change_windows:
      - day: saturday
        start: "02:00"
        end: "06:00"
        timezone: Europe/London
      - day: sunday
        start: "02:00"
        end: "06:00"
        timezone: Europe/London
    emergency_change_approvers:
      - j.smith@acme-corp.com
      - noc@yourcompany.com
    senior_engineers:
      - senior-ne-group@yourcompany.com

  # BGP ASN allocation for this customer
  bgp:
    customer_asn: 65100
    provider_asn: 65000
    route_target_base: "65000:100"    # Customer-specific RT base

  # Notes
  notes: >
    Enterprise customer since 2023. PCI-DSS in scope for finance segment.
    Has DR site at dc-west. Main technical contact prefers change notifications
    via email not Slack.
