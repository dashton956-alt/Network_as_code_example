intent:
  id: template-mgmt-dns-dhcp-001
  type: mgmt_dns_dhcp
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "DNS / DHCP — configure DNS resolver and DHCP client settings on all devices"

  scope:
    all_tenant_devices: true

  management:
    dns:
      servers:
        - "10.1.1.10"
        - "10.1.1.11"
      search_domains:
        - "acme-corp.internal"
        - "mgmt.acme-corp.internal"
      domain_name: "acme-corp.internal"
    dhcp:
      client_id: hostname
      default_gateway_override: false  # true = accept default from DHCP
      vrf: MGMT

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify DNS servers configured"
        expected:
          - config_snippet: "ip name-server 10.1.1.10"
          - config_snippet: "ip domain-name acme-corp.internal"
