intent:
  id: corp-mgmt-syslog-all-devices-001
  type: mgmt_syslog
  version: 1
  tenant: acme-corp
  change_ticket: CHG0012402
  description: "Syslog configuration — all network devices — central log collectors"

  scope:
    all_tenant_devices: true

  servers:
    - "10.0.1.200"
    - "10.0.1.201"
  facility: local7
  severity: informational
  source_interface: "Management0"

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmConfig
        label: "Verify syslog servers in running config"
        expected:
          - config_snippet: "logging host 10.0.1.200"
          - config_snippet: "logging host 10.0.1.201"
      - test_class: TestNapalmConfig
        label: "Verify syslog facility and severity"
        expected:
          - config_snippet: "logging facility local7"
          - config_snippet: "logging trap informational"
