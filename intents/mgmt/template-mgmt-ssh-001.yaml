intent:
  id: template-mgmt-ssh-001
  type: mgmt_ssh
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "SSH Access Control — enforce SSHv2-only, set timeout and allowed source ACL"

  scope:
    all_tenant_devices: true

  management:
    ssh:
      version: 2
      enabled: true
      authentication_retries: 3
      timeout_secs: 60
      idle_timeout_mins: 10
      key_bits: 4096
      algorithms:
        kex:
          - ecdh-sha2-nistp256
          - ecdh-sha2-nistp384
          - diffie-hellman-group14-sha256
        enc:
          - aes256-gcm@openssh.com
          - aes128-gcm@openssh.com
        mac:
          - hmac-sha2-256
          - hmac-sha2-512
      acl: ACL-SSH-SOURCES
      vty_lines:
        - range: "0 4"
          transport_in: ssh
          transport_out: none       # no outbound telnet
          exec_timeout_mins: 10
          access_class: ACL-SSH-SOURCES

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify SSHv2 configured"
        expected:
          - config_snippet: "ip ssh version 2"
          - config_snippet: "transport input ssh"
