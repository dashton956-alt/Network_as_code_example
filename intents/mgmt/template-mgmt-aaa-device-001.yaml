intent:
  id: template-mgmt-aaa-device-001
  type: mgmt_aaa_device
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "TACACS / RADIUS for Device Mgmt — configure TACACS+ for device login and command authorisation"

  scope:
    all_tenant_devices: true

  management:
    aaa_device:
      tacacs_servers:
        - host: "10.1.1.20"
          port: 49
          key_ref: vault:secret/tacacs/acme-corp-device
          timeout: 5
          priority: 1             # primary
        - host: "10.1.1.21"
          port: 49
          key_ref: vault:secret/tacacs/acme-corp-device
          timeout: 5
          priority: 2             # secondary
      server_group: TACACS-CORP
      authentication:
        login: "group TACACS-CORP local"
      authorization:
        exec: "group TACACS-CORP local if-authenticated"
        commands_15: "group TACACS-CORP none"
      accounting:
        commands_0: "start-stop group TACACS-CORP"
        commands_15: "start-stop group TACACS-CORP"
        exec: "start-stop group TACACS-CORP"
      local_fallback:
        username: emergency-admin
        privilege: 15
        password_ref: vault:secret/local-accounts/emergency

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify TACACS+ server group configured"
        expected:
          - config_snippet: "tacacs server"
          - config_snippet: "aaa authentication login"
