intent:
  id: template-mgmt-interface-001
  type: mgmt_interface
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "Loopback / Management Interface — configure loopback0 and dedicated OOB management"

  scope:
    all_tenant_devices: true

  management:
    interfaces:
      loopback:
        name: Loopback0
        description: "Router ID / BGP Source"
        ip_range: "10.255.0.0/24"  # per-device IP assigned from this range
        mtu: 65535
      oob_management:
        name: Management0
        description: "OOB management — connected to mgmt switch"
        vrf: MGMT
        speed: 1000
        duplex: full
        shutdown: false

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmInterfaces
        label: "Verify loopback0 and management0 are up"
        expected:
          - name: Loopback0
            is_up: true
            is_enabled: true
          - name: Management0
            is_up: true
            is_enabled: true
