intent:
  id: corp-mgmt-lldp-cdp-all-devices-001
  type: mgmt_lldp_cdp
  version: 1
  tenant: acme-corp
  change_ticket: CHG0012410
  description: "Enable LLDP globally, disable CDP globally — all network devices"

  scope:
    all_tenant_devices: true

  lldp_global: true
  cdp_global: false

  lldp_interfaces:
    - interface: Ethernet1
      enabled: true
    - interface: Ethernet2
      enabled: true

  cdp_interfaces: []

  disable_on:
    - Management0

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmLldpNeighbors
        label: "Verify LLDP is active on Ethernet1 and Ethernet2"
        test_data:
          - host: lab-arista-sw01
            expected:
              - local_port: Ethernet1
                neighbor: lab-spine-01
          - host: lab-arista-sw02
            expected:
              - local_port: Ethernet1
                neighbor: lab-spine-02
