intent:
  id: template-qos-dscp-mark-001
  type: qos_dscp_mark
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "DSCP Marking — apply DSCP remarking at network ingress trust boundary"

  scope:
    roles:
      - access-switch
      - distribution-switch

  qos:
    dscp_marking:
      policy_name: DSCP-REMARK-INGRESS
      classes:
        - name: MATCH-VOIP-RTP
          match:
            protocol: rtp           # match RTP media streams
          set:
            dscp: EF
        - name: MATCH-VOIP-SIGNALING
          match:
            protocol:
              - sip
              - h323
          set:
            dscp: CS3
        - name: MATCH-INTERACTIVE-VIDEO
          match:
            dscp: CS4
          set:
            dscp: AF41
        - name: MATCH-BULK-DATA
          match:
            protocol: ftp
          set:
            dscp: AF11
        - name: MATCH-DEFAULT
          match: any
          set:
            dscp: default
      apply:
        - interface_pattern: Ethernet[0-9]+  # all access ports
          direction: in

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify DSCP marking policy configured"
        expected:
          - config_snippet: "policy-map DSCP-REMARK-INGRESS"
          - config_snippet: "set dscp ef"
