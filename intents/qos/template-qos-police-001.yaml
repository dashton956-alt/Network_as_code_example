intent:
  id: template-qos-police-001
  type: qos_police
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "Policing — rate-limit inbound customer traffic at PE or distribution layer"

  scope:
    roles:
      - pe-router
      - distribution-switch

  qos:
    policing:
      policy_name: POLICE-CUSTOMER-INGRESS
      classes:
        - name: POLICE-VOICE
          match:
            dscp: EF
          police:
            rate_mbps: 10
            burst_kbytes: 10
            conform_action: transmit
            exceed_action: drop
        - name: POLICE-BULK-DATA
          match:
            dscp:
              - AF11
              - AF12
          police:
            rate_mbps: 100
            burst_kbytes: 256
            conform_action: transmit
            exceed_action: set-dscp-transmit af12   # down-mark on exceed
            violate_action: drop
        - name: POLICE-DEFAULT
          match: any
          police:
            rate_mbps: 50
            burst_kbytes: 128
            conform_action: transmit
            exceed_action: drop
      apply:
        - interface: GigabitEthernet0/2
          direction: in

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify policing policy on customer interface"
        expected:
          - config_snippet: "policy-map POLICE-CUSTOMER-INGRESS"
          - config_snippet: "police rate"
