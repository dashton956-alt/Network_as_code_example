intent:
  id: template-qos-queue-001
  type: qos_queue
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "Queuing Policy — define CBWFQ/LLQ egress scheduling on WAN-facing interfaces"

  scope:
    sites:
      - branch-lon
    roles:
      - branch-router

  qos:
    queuing:
      policy_name: QOS-EGRESS-WAN
      classes:
        - name: VOICE
          match:
            dscp: EF
          scheduling: priority     # LLQ — strict priority
          bandwidth_pct: 20
          max_burst: 10000
        - name: VIDEO
          match:
            dscp:
              - AF41
              - AF43
          scheduling: cbwfq
          bandwidth_pct: 25
          fair_queue: false
        - name: BUSINESS-DATA
          match:
            dscp:
              - AF21
              - AF23
          scheduling: cbwfq
          bandwidth_pct: 35
        - name: BEST-EFFORT
          match: any
          scheduling: fair-queue
          bandwidth_pct: 20
      apply:
        - interface: GigabitEthernet0/0
          direction: out

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify queuing policy applied on WAN interface"
        expected:
          - config_snippet: "policy-map QOS-EGRESS-WAN"
          - config_snippet: "service-policy output QOS-EGRESS-WAN"
