intent:
  id: template-vrf-basic-001
  type: vrf_basic
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "VRF (non-MPLS) — provision VRF instances for tenant network segmentation"

  scope:
    sites:
      - dc-east
    roles:
      - core-router
      - distribution-switch

  routing:
    vrfs:
      - name: PROD
        description: "Production tenant VRF"
        rd: "65001:100"
        address_families:
          - ipv4_unicast
        interfaces:
          - GigabitEthernet0/1.100
      - name: DEV
        description: "Development tenant VRF"
        rd: "65001:200"
        address_families:
          - ipv4_unicast
        interfaces:
          - GigabitEthernet0/1.200
      - name: MGMT
        description: "Out-of-band management VRF"
        rd: "65001:999"
        address_families:
          - ipv4_unicast
        interfaces:
          - GigabitEthernet0/0

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify VRF instances created"
        expected:
          - config_snippet: "vrf instance PROD"
          - config_snippet: "vrf instance DEV"
          - config_snippet: "vrf instance MGMT"
