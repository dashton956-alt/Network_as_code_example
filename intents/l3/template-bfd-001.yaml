intent:
  id: template-bfd-001
  type: bfd
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "BFD — configure Bidirectional Forwarding Detection for fast failover"

  scope:
    roles:
      - core-router
      - pe-router

  bfd:
    interval_ms: 300              # minimum transmit/receive interval in ms
    min_rx_ms: 300
    multiplier: 3                 # detect multiplier (failure after 3 missed packets)
    clients:
      - protocol: ospf
        process_id: 1
        all_interfaces: true
      - protocol: bgp
        neighbors:
          - "10.255.0.2"
          - "10.255.0.3"
      - protocol: isis
        process_id: 1
        all_interfaces: true

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify BFD interval configured"
        expected:
          - config_snippet: "bfd interval"
