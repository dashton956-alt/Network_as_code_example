intent:
  id: fin-pci-connectivity-001
  type: connectivity
  version: 1
  tenant: acme-corp
  change_ticket: CHG0012345
  description: "Finance servers to Stripe payment gateway — PCI-DSS compliant MPLS L3VPN"

  source:
    group: finance-servers
    sites:
      - dc-east
      - dc-west

  destination:
    external: true
    provider: stripe
    prefixes:
      - "52.84.0.0/14"
      - "54.182.0.0/16"

  policy:
    compliance: PCI-DSS
    encryption: required
    max_latency_ms: 20
    tenant_asn: 64612

  isolation:
    deny_groups:
      - employee-lan
      - guest-wifi
    deny_protocols:
      - telnet
      - http
      - ftp
      - snmpv1
      - snmpv2

  deployment:
    controller: nornir
    strategy: all_at_once
    save_config: true

  verification:
    level: nuts
    trigger: both
    schedule: "*/15 * * * *"
    fail_action: alert
    tests:
      - test_class: TestNapalmBgpNeighbors
        label: "Verify MPLS PE BGP sessions for PCI traffic path"
        test_data:
          - host: dc-east-pe-01
            expected:
              - peer: dc-west-pe-01
                state: Established
      - test_class: TestNapalmNetworkInstances
        label: "Verify PCI VRF is present on PE routers"
        expected:
          - name: PCI-FINANCE
            type: L3VRF
