intent:
  id: corp-wifi-staff-campus-lon-001
  type: wireless_ssid
  version: 1
  tenant: acme-corp
  change_ticket: CHG0012351
  description: "Staff wireless SSID — WPA3 Enterprise 802.1X — London campus"

  wireless:
    ssid: CORP-STAFF
    security_mode: wpa3-enterprise
    band: dual
    hidden: false
    client_isolation: false
    radius_server_group: corp-radius-group
    fast_roaming: true
    band_steering: true
    sites:
      - campus-london

  policy:
    compliance: NONE
    encryption: required

  deployment:
    controller: catalyst_center
    controller_site: campus-london
    strategy: canary

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmInterfaces
        label: "Verify staff VLAN interface is up"
        expected:
          - name: Vlan400
            is_enabled: true
            is_up: true
