intent:
  id: template-multicast-pim-sm-001
  type: multicast_pim_sm
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "PIM Sparse Mode — configure PIM-SM with Rendezvous Point for enterprise multicast"

  scope:
    sites:
      - dc-east
    roles:
      - core-router
      - distribution-switch

  multicast:
    pim:
      mode: sparse-mode
      rp:
        type: static              # static | auto-rp | bsr
        address: "10.255.0.100"   # RP loopback address
        groups:
          - "224.0.0.0/4"         # all multicast
      interfaces:
        - name: GigabitEthernet0/0
          enabled: true
          hello_interval: 30
          dr_priority: 100
        - name: GigabitEthernet0/1
          enabled: true
        - name: Loopback0
          enabled: true
      spt_threshold: 0            # 0 = switch to SPT immediately
      ip_multicast_routing: true

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: both
    schedule: "*/30 * * * *"
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify PIM sparse-mode configured"
        expected:
          - config_snippet: "ip multicast-routing"
          - config_snippet: "ip pim sparse-mode"
