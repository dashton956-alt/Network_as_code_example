intent:
  id: template-evpn-mpls-001
  type: evpn_mpls
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "EVPN over MPLS — configure BGP EVPN control plane with MPLS data plane"

  scope:
    roles:
      - pe-router

  mpls:
    evpn:
      evi: 100                   # EVPN instance ID
      encapsulation: mpls
      rd: "65001:100"
      rt_import:
        - "65001:100"
      rt_export:
        - "65001:100"
      bgp:
        as_number: 65001
        address_family: l2vpn evpn
      mac_vrf:
        vni: 10100
        bridge_domain: 100
      flood_suppression: true
      arp_suppression: true

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify EVPN instance configured"
        expected:
          - config_snippet: "l2vpn evpn"
