intent:
  id: template-mpls-l3vpn-001
  type: mpls_l3vpn
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "MPLS L3VPN — provision VRF and PE-CE routing for an enterprise L3VPN service"

  scope:
    roles:
      - pe-router

  mpls:
    l3vpn:
      vrf_name: ACME-CORP-L3VPN
      rd: "65001:1000"
      rt_import:
        - "65001:1000"
      rt_export:
        - "65001:1000"
      pe_ce_protocol: ebgp         # ebgp | ospf | eigrp | static | rip
      pe_ce_as: 65100
      interfaces:
        - GigabitEthernet0/2       # CE-facing interface
      ce_neighbors:
        - ip: "10.1.0.2"
          remote_as: 65100
          description: "CE router — ACME London"

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: both
    schedule: "*/30 * * * *"
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify L3VPN VRF configuration"
        expected:
          - config_snippet: "vrf definition ACME-CORP-L3VPN"
          - config_snippet: "rd 65001:1000"
