intent:
  id: template-pseudowire-001
  type: pseudowire
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "Pseudowire / EoMPLS — configure point-to-point Layer 2 pseudowire between two PEs"

  scope:
    devices:
      - pe-router-lon-01

  mpls:
    pseudowire:
      local_interface: GigabitEthernet0/2
      description: "EoMPLS circuit — London to Frankfurt"
      remote_pe: "10.255.0.4"    # Frankfurt PE loopback
      vcid: 200
      encapsulation: mpls         # mpls | l2tpv3
      mtu: 1500
      control_word: true

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: both
    schedule: "*/30 * * * *"
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify pseudowire xconnect configured"
        expected:
          - config_snippet: "xconnect 10.255.0.4 200 encapsulation mpls"
