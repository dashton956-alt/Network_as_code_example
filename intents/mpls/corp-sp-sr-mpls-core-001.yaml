intent:
  id: corp-sp-sr-mpls-core-001
  type: sr_mpls
  version: 1
  tenant: acme-corp
  change_ticket: CHG0012360
  description: "Segment Routing MPLS — configure SRGB and prefix-SID on all core P/PE routers"

  scope:
    sites:
      - dc-east
      - dc-west
      - pop-london
      - pop-frankfurt
    roles:
      - p-router
      - pe-router

  routing:
    protocol: isis
    process_id: 1

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: both
    schedule: "0 */6 * * *"
    fail_action: alert
    tests:
      - test_class: TestNetmikoOspfNeighbors
        label: "Verify IS-IS/OSPF adjacencies in MPLS core"
        test_data:
          - host: dc-east-p-01
            expected:
              - neighbor_id: dc-west-p-01
                state: FULL
      - test_class: TestNapalmInterfaces
        label: "Verify core-facing interfaces are up"
        expected:
          - name: Ethernet1
            is_enabled: true
            is_up: true
