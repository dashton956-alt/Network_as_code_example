intent:
  id: template-mvpn-001
  type: mvpn
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "Multicast VRF / mVPN — enable multicast forwarding inside MPLS L3VPN"

  scope:
    roles:
      - pe-router

  mpls:
    mvpn:
      vrf_name: ACME-CORP-L3VPN
      p_tunnel_type: rsvp-te-p2mp  # rsvp-te-p2mp | mldp-p2mp | in-band-signaling
      spt_infinity:
        enabled: true
        threshold_kbps: 0
      default_mdt:
        address: "239.1.1.1"
      data_mdt:
        address_range: "239.1.2.0/24"
        threshold_kbps: 100
      rpf_select: vrf_table        # vrf_table | default

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify mVPN address-family"
        expected:
          - config_snippet: "address-family ipv4 mdt"
