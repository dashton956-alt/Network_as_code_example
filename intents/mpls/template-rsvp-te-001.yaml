intent:
  id: template-rsvp-te-001
  type: rsvp_te
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "RSVP-TE Tunnel — configure RSVP traffic-engineered LSP from London to DC East"

  scope:
    devices:
      - pe-router-lon-01

  mpls:
    rsvp_te:
      tunnels:
        - name: Tunnel100
          description: "TE-LSP London to DC-East primary"
          destination: "10.255.0.2"   # DC-East PE loopback
          bandwidth_mbps: 100
          auto_bw: false
          signalling: rsvp
          path:
            preference: explicit
            primary_path:
              - "10.10.0.2"
              - "10.10.0.10"
              - "10.255.0.2"
            secondary_path: any
          fast_reroute: true
          priority:
            setup: 5
            hold: 5
          forwarding_adjacency: false

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify RSVP-TE tunnel configured"
        expected:
          - config_snippet: "interface Tunnel100"
          - config_snippet: "tunnel mode mpls traffic-eng"
