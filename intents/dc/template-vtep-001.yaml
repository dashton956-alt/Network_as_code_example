intent:
  id: template-vtep-001
  type: vtep
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "VTEP Configuration — define VXLAN VTEP source and flood-and-learn or EVPN control plane"

  scope:
    sites:
      - dc-east
    roles:
      - leaf-switch

  dc:
    vtep:
      source_interface: Loopback1
      udp_port: 4789
      flood_mode: evpn             # evpn | flood-and-learn | ingress-replication
      mcast_group: null            # set to IP if using multicast flood
      ingress_replication:
        enabled: true
        peers:
          - "10.255.1.2"
          - "10.255.1.3"
      vni_map:
        - vlan: 100
          vni: 10100
        - vlan: 101
          vni: 10101
        - vlan: 200
          vni: 10200

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify VTEP VXLAN interface"
        expected:
          - config_snippet: "vxlan udp-port 4789"
