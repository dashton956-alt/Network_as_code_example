intent:
  id: template-bgp-evpn-af-001
  type: bgp_evpn_af
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "BGP EVPN Address Family — activate L2VPN EVPN AF on leaf/spine underlay BGP sessions"

  scope:
    sites:
      - dc-east
    roles:
      - leaf-switch
      - spine-switch

  routing:
    protocol: bgp
    as_number: 65001
    router_id: "10.255.0.1"
    address_families:
      l2vpn_evpn:
        enabled: true
        neighbors:
          - ip: "10.255.0.100"
            remote_as: 65001
            description: "Spine-01 EVPN peer"
            update_source: Loopback0
            activate: true
            send_community: extended
            next_hop_unchanged: false
          - ip: "10.255.0.101"
            remote_as: 65001
            description: "Spine-02 EVPN peer"
            update_source: Loopback0
            activate: true
            send_community: extended

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: both
    schedule: "*/30 * * * *"
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify EVPN address-family activated"
        expected:
          - config_snippet: "address-family evpn"
          - config_snippet: "neighbor 10.255.0.100 activate"
