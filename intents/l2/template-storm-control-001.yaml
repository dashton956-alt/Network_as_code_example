intent:
  id: template-storm-control-001
  type: storm_control
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "Storm Control — rate-limit broadcast, multicast, and unknown-unicast traffic on edge ports"

  scope:
    roles:
      - access-switch

  storm_control:
    apply_to_all_access_ports: true
    broadcast:
      level_pct: 10             # percent of available bandwidth
      action: shutdown          # shutdown | trap | none
    multicast:
      level_pct: 20
      action: trap
    unknown_unicast:
      level_pct: 10
      action: trap

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify storm-control configuration"
        expected:
          - config_snippet: "storm-control broadcast level 10"
          - config_snippet: "storm-control multicast level 20"
