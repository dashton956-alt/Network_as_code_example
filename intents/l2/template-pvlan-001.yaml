intent:
  id: template-pvlan-001
  type: pvlan
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "Private VLAN — isolate hosts within the same primary VLAN"

  scope:
    devices:
      - dc-east-access-sw-01

  pvlan:
    primary_vlan: 100
    isolated_vlan: 101
    community_vlans:
      - 102
      - 103
    promiscuous_ports:
      - interface: GigabitEthernet0/1
        desc: "Uplink to default gateway"
    isolated_ports:
      - interface: GigabitEthernet0/2
        desc: "Isolated host port"
    community_ports:
      - interface: GigabitEthernet0/3
        community_vlan: 102
        desc: "Community host A"

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify private-vlan configuration"
        expected:
          - config_snippet: "private-vlan primary"
          - config_snippet: "private-vlan isolated"
