intent:
  id: corp-aws-direct-connect-prod-001
  type: cloud_direct_connect
  version: 1
  tenant: acme-corp
  change_ticket: CHG0012354
  description: "AWS Direct Connect — 1Gbps private VIF — DC East to eu-west-1 production"

  cloud:
    provider: aws
    region: eu-west-1
    account_id: "123456789012"
    resource_type: direct_connect
    bgp_asn: 65001
    bandwidth_mbps: 1000

  policy:
    compliance: NONE
    encryption: required

  deployment:
    controller: nornir
    strategy: canary

  verification:
    level: nuts
    trigger: both
    schedule: "*/30 * * * *"
    fail_action: alert
    tests:
      - test_class: TestNapalmBgpNeighbors
        label: "Verify BGP session to AWS Direct Connect"
        expected:
          - peer: aws-dx-peer
            state: Established
