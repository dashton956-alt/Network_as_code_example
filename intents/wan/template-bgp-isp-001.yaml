intent:
  id: template-bgp-isp-001
  type: bgp_isp
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "BGP to ISP — configure eBGP peering with dual ISPs and advertise customer prefixes"

  scope:
    devices:
      - lon-edge-rtr-01

  routing:
    protocol: bgp
    as_number: 65001
    router_id: "10.255.0.1"
    customer_prefixes:
      - "203.0.113.0/24"
    neighbors:
      - ip: "203.0.113.1"
        remote_as: 1299
        description: "Telia — primary ISP"
        update_source: GigabitEthernet0/0
        prefix_limit_in: 800000   # full Internet table
        route_map_out: RM-ADVERTISE-TO-ISP
        communities:
          send: true
      - ip: "198.51.100.1"
        remote_as: 5400
        description: "BT — secondary ISP"
        update_source: GigabitEthernet0/1
        prefix_limit_in: 800000
        route_map_out: RM-ADVERTISE-TO-ISP
    filters:
      inbound_prefix_list: PL-DENY-BOGONS
      outbound_prefix_list: PL-ADVERTISE-TO-ISP

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: all_at_once
    save_config: true

  verification:
    level: nuts
    trigger: both
    schedule: "*/30 * * * *"
    fail_action: alert
    tests:
      - test_class: TestNapalmBgpNeighbors
        label: "Verify BGP sessions to both ISPs"
        expected:
          - peer: 203.0.113.1
            remote_as: 1299
            state: Established
          - peer: 198.51.100.1
            remote_as: 5400
            state: Established
