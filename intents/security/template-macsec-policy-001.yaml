intent:
  id: template-macsec-policy-001
  type: macsec_policy
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "MACsec Policy — define MACsec key agreement policy for inter-switch links"

  scope:
    sites:
      - dc-east
    roles:
      - leaf-switch
      - spine-switch

  security:
    macsec_policy:
      name: MACSEC-ISL-POLICY
      cipher_suite: GCM-AES-256
      key_server_priority: 0      # lower = key server
      replay_protection: true
      window_size: 64
      sak_rekey_interval: 3600    # seconds
      mka:
        lifetime: 6
        policy: MACSEC-MKA
      apply_to:
        roles:
          - leaf-switch
          - spine-switch
        port_type: inter-switch-link

  policy:
    compliance: NONE
    encryption: macsec

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify MACsec policy applied"
        expected:
          - config_snippet: "macsec policy MACSEC-ISL-POLICY"
