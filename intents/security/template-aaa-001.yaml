intent:
  id: template-aaa-001
  type: aaa
  version: 1
  tenant: acme-corp
  change_ticket: CHG00XXXXX
  description: "RADIUS / TACACS AAA — configure authentication, authorization, and accounting"

  scope:
    all_tenant_devices: true

  security:
    aaa:
      new_model: true
      servers:
        tacacs:
          - host: "10.1.1.20"
            port: 49
            key_ref: vault:secret/tacacs/acme-corp
            timeout: 5
            single_connection: true
          - host: "10.1.1.21"
            port: 49
            key_ref: vault:secret/tacacs/acme-corp
            timeout: 5
      authentication:
        login: "group tacacs+ local"
        enable: "group tacacs+ enable"
      authorization:
        exec: "group tacacs+ local if-authenticated"
        commands_1: "group tacacs+ none"
        commands_15: "group tacacs+ none"
      accounting:
        exec: "start-stop group tacacs+"
        commands_15: "start-stop group tacacs+"
      local_fallback_user:
        username: LOCAL-FALLBACK
        privilege: 15
        password_ref: vault:secret/local-accounts/fallback

  policy:
    compliance: NONE
    encryption: none

  deployment:
    controller: nornir
    strategy: rolling
    save_config: true

  verification:
    level: nuts
    trigger: on_deploy
    fail_action: alert
    tests:
      - test_class: TestNapalmRunningConfigContains
        label: "Verify AAA new-model and TACACS+"
        expected:
          - config_snippet: "aaa new-model"
          - config_snippet: "aaa authentication login"
