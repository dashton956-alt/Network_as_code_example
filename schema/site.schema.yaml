# Site Schema - validates site definition YAML files

name: Site Schema

type: map
mapping:
  site:
    type: map
    required: true
    mapping:
      id:
        type: str
        required: true
        pattern: "^[a-z0-9-]+$"

      name:
        type: str
        required: true

      tenant:
        type: str
        required: true

      location:
        type: map
        required: true
        mapping:
          country:
            type: str
          city:
            type: str
          timezone:
            type: str

      role:
        type: str
        required: true
        enum: [dc-primary, dc-secondary, branch, hub, spoke]

      devices:
        type: seq
        required: true
        sequence:
          - type: map
            mapping:
              name:
                type: str
                required: true
              role:
                type: str
                required: true
                enum: [core-router, edge-router, access-switch, distribution-switch, firewall, loadbalancer]
              platform:
                type: str
                required: true
                desc: "Must match Nautobot platform slug"
              management_ip:
                type: str
                required: true
              nautobot_id:
                type: str
                desc: "UUID from Nautobot - populated after device is registered"

      uplinks:
        type: seq
        required: false
        sequence:
          - type: map
            mapping:
              provider:
                type: str
              circuit_id:
                type: str
              bandwidth_mbps:
                type: int
              type:
                type: str
                enum: [mpls, internet, dark-fibre, sdwan]
