# Intent Schema - all intent YAML files are validated against this
# Tool: pykwalify
# Usage: pykwalify -d <intent.yaml> -s schema/intent.schema.yaml

name: Intent Schema
desc: Validates network intent YAML files

type: map
matching-rule: any
mapping:
  intent:
    type: map
    required: true
    mapping:
      id:
        type: str
        required: true
        pattern: "^[a-z0-9-]+$"
        desc: "Lowercase alphanumeric with hyphens. e.g. fin-pci-connectivity-001"

      type:
        type: str
        required: true
        enum: [connectivity, security, reachability, service]

      version:
        type: int
        required: true
        desc: "Increment this on every change to the intent"

      status:
        type: str
        required: true
        enum: [draft, validated, deployed, deprecated, rolled_back]

      tenant:
        type: str
        required: true
        desc: "Must match a directory name under customers/"

      description:
        type: str
        required: true

      source:
        type: map
        required: false
        mapping:
          group:
            type: str
          sites:
            type: seq
            sequence:
              - type: str

      destination:
        type: map
        required: false
        mapping:
          group:
            type: str
          external:
            type: bool
          provider:
            type: str
          prefixes:
            type: seq
            sequence:
              - type: str
                pattern: "^[0-9./]+$"

      policy:
        type: map
        required: false
        mapping:
          compliance:
            type: str
            enum: [PCI-DSS, HIPAA, SOC2, ISO27001, none]
          encryption:
            type: str
            enum: [required, preferred, none]
          max_latency_ms:
            type: int
          failover_ms:
            type: int
          bandwidth_mbps:
            type: int
          qos_class:
            type: str
            enum: [critical-business, standard-business, best-effort]

      isolation:
        type: map
        required: false
        mapping:
          deny_groups:
            type: seq
            sequence:
              - type: str
          deny_protocols:
            type: seq
            sequence:
              - type: str
                enum: [telnet, http, ftp, snmpv1, snmpv2]

      implementation_notes:
        type: str
        required: false
