# .github/workflows/intent-pipeline.yml
#
# Main CI pipeline — runs on every Pull Request
# Validates, policy-checks, simulates, and renders intent changes
# before a human reviewer ever looks at the PR.

name: Intent Validation Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - 'customers/**/intents/**/*.yaml'
      - 'customers/**/sites/**/*.yaml'
      - 'policies/**/*.rego'
      - 'schema/**/*.yaml'

env:
  NAUTOBOT_URL: ${{ secrets.NAUTOBOT_URL }}
  NAUTOBOT_TOKEN: ${{ secrets.NAUTOBOT_TOKEN }}
  OPA_URL: ${{ secrets.OPA_URL }}
  INTENT_ENGINE_URL: ${{ secrets.INTENT_ENGINE_URL }}
  BATFISH_HOST: ${{ secrets.BATFISH_HOST }}

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Schema Validation
  # Fast fail — catches YAML syntax and structural errors immediately
  # ─────────────────────────────────────────────────────────────────
  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install pykwalify pyyaml

      - name: Get changed intent files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            customers/**/intents/**/*.yaml
            customers/**/sites/**/*.yaml

      - name: Validate intent schemas
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python scripts/validation/validate_schemas.py \
            --changed-files "${{ steps.changed-files.outputs.all_changed_files }}"

      - name: Validate YAML lint
        run: |
          pip install yamllint
          yamllint -c .yamllint.yml customers/

      - name: Check naming conventions
        run: |
          python scripts/validation/check_naming.py \
            --changed-files "${{ steps.changed-files.outputs.all_changed_files }}"


  # ─────────────────────────────────────────────────────────────────
  # JOB 2: OPA Policy Checks
  # Checks intent against business rules, compliance, capacity
  # Requires Nautobot context (topology, existing intents, customer policy)
  # ─────────────────────────────────────────────────────────────────
  opa-policy-check:
    name: OPA Policy Check
    runs-on: ubuntu-latest
    needs: schema-validation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Get changed intent files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: customers/**/intents/**/*.yaml

      - name: Run OPA policy checks
        if: steps.changed-files.outputs.any_changed == 'true'
        id: opa-check
        run: |
          python scripts/validation/run_opa_checks.py \
            --changed-files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --nautobot-url "$NAUTOBOT_URL" \
            --nautobot-token "$NAUTOBOT_TOKEN" \
            --opa-url "$OPA_URL" \
            --output-file opa-results.json

      - name: Post OPA results as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('opa-results.json', 'utf8'));

            let body = '## 🔍 OPA Policy Check Results\n\n';

            if (results.all_passed) {
              body += '✅ **All policy checks passed**\n\n';
            } else {
              body += '❌ **Policy violations found — resolve before merge**\n\n';
            }

            for (const check of results.checks) {
              const icon = check.passed ? '✅' : '❌';
              body += `### ${icon} ${check.intent_id}\n`;
              if (check.violations.length > 0) {
                body += '**Violations:**\n';
                for (const v of check.violations) {
                  body += `- ${v}\n`;
                }
              } else {
                body += 'No violations\n';
              }
              body += '\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload OPA results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: opa-results
          path: opa-results.json


  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Intent Resolution
  # Calls the resolution service to produce a normalized plan
  # Output used by rendering and simulation jobs
  # ─────────────────────────────────────────────────────────────────
  intent-resolution:
    name: Intent Resolution
    runs-on: ubuntu-latest
    needs: opa-policy-check
    outputs:
      resolution_artifact: ${{ steps.resolve.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Get changed intent files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: customers/**/intents/**/*.yaml

      - name: Resolve intents
        if: steps.changed-files.outputs.any_changed == 'true'
        id: resolve
        run: |
          python scripts/rendering/resolve_intents.py \
            --changed-files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --nautobot-url "$NAUTOBOT_URL" \
            --nautobot-token "$NAUTOBOT_TOKEN" \
            --intent-engine-url "$INTENT_ENGINE_URL" \
            --output-file resolution-plan.json

          echo "artifact_name=resolution-plan" >> $GITHUB_OUTPUT

      - name: Upload resolution plan
        uses: actions/upload-artifact@v4
        with:
          name: resolution-plan
          path: resolution-plan.json


  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Config Rendering
  # Renders intent → vendor-specific config via Jinja2 templates
  # Produces the actual diffs that will be pushed to devices
  # ─────────────────────────────────────────────────────────────────
  config-rendering:
    name: Config Rendering
    runs-on: ubuntu-latest
    needs: intent-resolution
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download resolution plan
        uses: actions/download-artifact@v4
        with:
          name: resolution-plan

      - name: Render configs
        run: |
          python scripts/rendering/render_configs.py \
            --resolution-plan resolution-plan.json \
            --templates-dir templates/ \
            --output-dir rendered-candidate/

      - name: Generate human-readable diff summary
        run: |
          python scripts/rendering/generate_diff_summary.py \
            --candidate-dir rendered-candidate/ \
            --deployed-dir customers/ \
            --output-file diff-summary.md

      - name: Post config diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff-summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 📋 Rendered Config Diff\n\n' + diff
            });

      - name: Upload rendered configs
        uses: actions/upload-artifact@v4
        with:
          name: rendered-configs
          path: rendered-candidate/


  # ─────────────────────────────────────────────────────────────────
  # JOB 5: Batfish Network Simulation
  # Simulates the proposed config change against the network model
  # Checks for routing loops, ACL shadows, reachability violations
  # ─────────────────────────────────────────────────────────────────
  batfish-simulation:
    name: Batfish Network Simulation
    runs-on: ubuntu-latest
    needs: config-rendering
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pybatfish
        run: pip install pybatfish pyyaml

      - name: Download rendered configs
        uses: actions/download-artifact@v4
        with:
          name: rendered-configs
          path: rendered-candidate/

      - name: Run Batfish simulation
        id: batfish
        run: |
          python scripts/validation/run_batfish.py \
            --rendered-dir rendered-candidate/ \
            --network-snapshot customers/ \
            --batfish-host "$BATFISH_HOST" \
            --output-file batfish-results.json

      - name: Generate risk score
        id: risk
        run: |
          python scripts/validation/calculate_risk.py \
            --batfish-results batfish-results.json \
            --opa-results opa-results.json \
            --output-file risk-score.json

      - name: Post simulation results as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('batfish-results.json', 'utf8'));
            const risk = JSON.parse(fs.readFileSync('risk-score.json', 'utf8'));

            const riskEmoji = {
              low: '🟢',
              medium: '🟡',
              high: '🔴'
            };

            let body = `## 🕸️ Batfish Network Simulation\n\n`;
            body += `**Risk Score:** ${riskEmoji[risk.level]} ${risk.level.toUpperCase()} (${risk.score}/100)\n\n`;
            body += `**Blast Radius:** ${results.affected_devices.length} device(s) affected\n\n`;

            if (results.issues.length === 0) {
              body += '✅ No simulation issues found\n\n';
            } else {
              body += `⚠️ **${results.issues.length} issue(s) found:**\n\n`;
              for (const issue of results.issues) {
                const sev = issue.severity === 'error' ? '❌' : '⚠️';
                body += `${sev} **${issue.type}** on \`${issue.device}\`: ${issue.description}\n`;
              }
              body += '\n';
            }

            body += `**Reachability Tests:**\n`;
            for (const test of results.reachability_tests) {
              const icon = test.result === 'pass' ? '✅' : '❌';
              body += `${icon} ${test.description}\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if high risk
        run: |
          python -c "
          import json, sys
          risk = json.load(open('risk-score.json'))
          if risk['score'] >= 80:
              print(f'Risk score {risk[\"score\"]}/100 is too high for auto-approval. Requires manual senior engineer review.')
              sys.exit(1)
          print(f'Risk score {risk[\"score\"]}/100 - acceptable')
          "


  # ─────────────────────────────────────────────────────────────────
  # JOB 6: Final Status Check
  # Aggregates all job results into a single pass/fail for branch protection
  # ─────────────────────────────────────────────────────────────────
  pipeline-status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs:
      - schema-validation
      - opa-policy-check
      - intent-resolution
      - config-rendering
      - batfish-simulation
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.schema-validation.result }}" != "success" ]]; then
            echo "❌ Schema validation failed"
            exit 1
          fi
          if [[ "${{ needs.opa-policy-check.result }}" != "success" ]]; then
            echo "❌ OPA policy check failed"
            exit 1
          fi
          if [[ "${{ needs.batfish-simulation.result }}" != "success" ]]; then
            echo "❌ Batfish simulation failed"
            exit 1
          fi
          echo "✅ All pipeline checks passed - ready for human review"
