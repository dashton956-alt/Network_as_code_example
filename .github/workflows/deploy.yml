# .github/workflows/deploy.yml
#
# Deployment pipeline — triggers when a PR is merged to main
# Calls N8N webhook which orchestrates the actual device deployment

name: Deploy Intent

on:
  push:
    branches:
      - main
    paths:
      - 'customers/**/intents/**/*.yaml'

env:
  N8N_WEBHOOK_URL: ${{ secrets.N8N_DEPLOY_WEBHOOK_URL }}
  N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
  NAUTOBOT_URL: ${{ secrets.NAUTOBOT_URL }}
  NAUTOBOT_TOKEN: ${{ secrets.NAUTOBOT_TOKEN }}

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Identify what changed and trigger N8N deployment workflows
  # ─────────────────────────────────────────────────────────────────
  trigger-deployment:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml httpx

      - name: Get changed intent files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: customers/**/intents/**/*.yaml

      - name: Extract intent IDs and trigger N8N
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python scripts/deployment/trigger_n8n.py \
            --changed-files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --commit-sha "${{ github.sha }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --n8n-webhook-url "$N8N_WEBHOOK_URL" \
            --n8n-webhook-secret "$N8N_WEBHOOK_SECRET" \
            --nautobot-url "$NAUTOBOT_URL" \
            --nautobot-token "$NAUTOBOT_TOKEN"

      - name: Update Nautobot Intent status to deploying
        run: |
          python scripts/deployment/update_intent_status.py \
            --changed-files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --status "deploying" \
            --nautobot-url "$NAUTOBOT_URL" \
            --nautobot-token "$NAUTOBOT_TOKEN"
