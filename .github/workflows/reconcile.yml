# .github/workflows/reconcile.yml
#
# Scheduled reconciliation â€” runs every hour
# Detects drift between Git (desired state) and actual device state
# Triggers N8N remediation workflows for approved drift types

name: Reconciliation Check

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Allow manual trigger

env:
  NAUTOBOT_URL: ${{ secrets.NAUTOBOT_URL }}
  NAUTOBOT_TOKEN: ${{ secrets.NAUTOBOT_TOKEN }}
  N8N_WEBHOOK_URL: ${{ secrets.N8N_RECONCILE_WEBHOOK_URL }}
  N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}

jobs:
  reconcile:
    name: Detect and Remediate Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run reconciliation check
        id: reconcile
        run: |
          python scripts/deployment/reconcile.py \
            --nautobot-url "$NAUTOBOT_URL" \
            --nautobot-token "$NAUTOBOT_TOKEN" \
            --deployed-configs-path customers/ \
            --output-file drift-report.json

      - name: Process drift report
        id: drift
        run: |
          python scripts/deployment/process_drift.py \
            --drift-report drift-report.json \
            --n8n-webhook-url "$N8N_WEBHOOK_URL" \
            --n8n-webhook-secret "$N8N_WEBHOOK_SECRET" \
            --output-file remediation-actions.json

      - name: Open GitHub issue for non-auto-remediable drift
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const actions = JSON.parse(fs.readFileSync('remediation-actions.json', 'utf8'));

            for (const item of actions.manual_review_required) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[DRIFT] ${item.device} - ${item.drift_type}`,
                body: `## Configuration Drift Detected\n\n` +
                      `**Device:** \`${item.device}\`\n` +
                      `**Customer:** ${item.tenant}\n` +
                      `**Intent:** ${item.intent_id}\n` +
                      `**Drift Type:** ${item.drift_type}\n\n` +
                      `**Expected:**\n\`\`\`\n${item.expected}\n\`\`\`\n\n` +
                      `**Actual:**\n\`\`\`\n${item.actual}\n\`\`\`\n\n` +
                      `**Detected at:** ${item.detected_at}\n\n` +
                      `This drift requires manual review - it is not in the auto-remediation approved list.\n` +
                      `Assign to on-call engineer.`,
                labels: ['drift', 'needs-review', item.tenant]
              });
            }

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-report-${{ github.run_id }}
          path: |
            drift-report.json
            remediation-actions.json
